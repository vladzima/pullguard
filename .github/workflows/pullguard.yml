name: PullGuard

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pullguard:
    runs-on: ubuntu-latest
    steps:
      - uses: vladzima/pullguard@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          config: .github/pullguard.yml
