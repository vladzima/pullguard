name: PullGuard
description: Score pull request review risk and optionally comment, label, or close the PR.
author: pullguard

inputs:
  openai-api-key:
    description: OpenAI API key used for BYOK analysis.
    required: false
  anthropic-api-key:
    description: Anthropic API key used for BYOK analysis.
    required: false
  github-token:
    description: GitHub token used to read the PR and apply configured actions.
    required: false
    default: ${{ github.token }}
  config:
    description: Path to the PR quality policy file.
    required: false
    default: .github/pullguard.yml
  model:
    description: Optional model name override.
    required: false
  provider:
    description: Optional provider override. Supported values are openai and anthropic.
    required: false

outputs:
  score:
    description: Review-risk score from 0 to 100.
  labels:
    description: Comma-separated labels selected by policy.
  should-close:
    description: Whether the policy selected the close action.
  skipped:
    description: Whether PullGuard skipped because the configured trigger did not match.

runs:
  using: node20
  main: dist/index.js
