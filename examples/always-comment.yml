model:
  provider: openai
  name: gpt-5.4-mini-2026-03-17

trigger:
  mode: always
  label: run-pullguard
  comment: /pullguard
  allowCommentOverrides: true
  allowedCommentAuthorAssociations:
    - OWNER
    - MEMBER
    - COLLABORATOR

analysis:
  depth: pr
  maxFiles: 20
  maxPatchCharsPerFile: 4000
  maxBaseFileCharsPerFile: 6000
  maxFindings: 4
  maxReviewFirstFiles: 5

actions:
  comment:
    enabled: true
  labels:
    enabled: false
  close:
    enabled: false
    threshold: 95
